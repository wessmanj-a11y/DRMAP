name: Build ML Training Data

on:
  workflow_dispatch:   # allows manual run from GitHub UI
  schedule:
    - cron: "0 * * * *"   # runs every hour (optional)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run training data builder
        run: node scripts/build-training-data.js

      - name: Commit updated training data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add history/training-data.json
          git commit -m "Update training data" || echo "No changes"
          git push
