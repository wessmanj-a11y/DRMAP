name: Fetch outage data v2

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  fetch-outages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run outage script
        run: node scripts/fetch-outages.js

      - name: Fetch county weather forecast
        run: node scripts/fetch-county-weather-forecast.js

      - name: Merge county weather forecast into outage and history data
        run: node scripts/apply-county-weather-forecast.js

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Apply ML risk scoring
        run: python scripts/apply-ml-risk-v2.py

      - name: Commit updated outage data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update outage weather and ML risk"
          file_pattern: outages.json history/outage-history.json history/county-weather-forecast.json
