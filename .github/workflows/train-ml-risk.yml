name: Train ML Risk Model

on:
  workflow_dispatch:
  schedule:
    - cron: "30 */6 * * *"

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train ML model
        run: python scripts/train-ml-risk.py

      - name: Commit ML model outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update ML risk model"
          file_pattern: history/ml-risk-*
