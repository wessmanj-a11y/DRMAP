<!DOCTYPE html>
<html>
<head>
<title>Texas Resilience Command Center</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
#map { height:100vh; }

.panel {
  position:absolute;
  top:10px;
  left:10px;
  background:#020617;
  padding:12px;
  border-radius:10px;
  width:260px;
}

h2 { margin:0 0 8px 0; }

.metric { margin:6px 0; }
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<h2>Texas Grid Status</h2>

<div class="metric">Customers Out: <span id="total">—</span></div>
<div class="metric">Counties Impacted: <span id="counties">—</span></div>

<hr>

<div id="selected">Click a county</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([31,-99],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let countyData = {};
let geojson;

// --- LOAD DATA ---
async function load() {
  const [geo, outages, nws] = await Promise.all([
    fetch("https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json").then(r=>r.json()),
    fetch("outages.json").then(r=>r.json()),
    fetch("https://api.weather.gov/alerts/active?area=TX").then(r=>r.json())
  ]);

  geojson = geo;

  geo.features.forEach(f => {
    if (f.properties.STATE !== "48") return;
    countyData[f.properties.NAME] = {
      customers:0,
      incidents:0,
      weather:0
    };
  });

  outages.outages.forEach(o => {
    if (countyData[o.county]) {
      countyData[o.county].customers += o.customersOut;
      countyData[o.county].incidents += o.incidents;
    }
  });

  nws.features.forEach(a => {
    const area = a.properties.areaDesc.toLowerCase();
    Object.keys(countyData).forEach(c => {
      if (area.includes(c.toLowerCase())) {
        countyData[c].weather++;
      }
    });
  });

  draw();
}

// --- SEVERITY ---
function severity(c) {
  return Math.min(100,
    Math.log10(1 + c.customers)*20 +
    c.incidents*3 +
    c.weather*10
  );
}

// --- DRAW MAP ---
function draw() {

  const max = Math.max(...Object.values(countyData).map(severity));

  L.geoJSON(geojson, {
    filter: f => f.properties.STATE === "48",

    style: f => {
      const c = countyData[f.properties.NAME];
      if (!c) return {};

      const s = severity(c) / max;

      let color =
        s > .75 ? "#dc2626" :
        s > .5 ? "#f97316" :
        s > .3 ? "#facc15" :
        "#60a5fa";

      return {
        fillColor: color,
        fillOpacity: .7,
        color: "#fff",
        weight: 1
      };
    },

    onEachFeature: (f, layer) => {
      const c = countyData[f.properties.NAME];

      layer.on("click", () => {
        document.getElementById("selected").innerHTML =
          `<b>${f.properties.NAME} County</b><br>
           Customers: ${c.customers}<br>
           Incidents: ${c.incidents}<br>
           Weather Alerts: ${c.weather}<br>
           Severity: ${Math.round(severity(c))}`;
      });
    }

  }).addTo(map);

  document.getElementById("total").textContent =
    Object.values(countyData)
      .reduce((s,c)=>s+c.customers,0)
      .toLocaleString();

  document.getElementById("counties").textContent =
    Object.values(countyData)
      .filter(c=>c.customers>0).length;
}

load();
</script>

</body>
</html>
